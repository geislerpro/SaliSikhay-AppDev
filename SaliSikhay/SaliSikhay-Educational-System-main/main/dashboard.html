<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashAI - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">⚡ SalikSikh<span>AI</span></h1>
            <div class="user-profile">
                <span id="welcome-message">Welcome, User</span>
                <button id="logout-btn" class="logout-link">Log Out</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        
        <section class="generator-section">
            <h2>Generate New Flashcards</h2>
            <p class="section-desc">Use our AI engine to convert topics, prompts, or documents into study material instantly.</p>
            
            <div class="generator-grid">
                <div class="gen-card prompt-box">
                    <h3>Describe your Topic</h3>
                    <form id="ai-generation-form">
                        <div class="input-group">
                            <label for="ai-prompt">What are you studying today?</label>
                            <textarea id="ai-prompt" placeholder="e.g., Photosynthesis steps, JavaScript closures, Roman Empire fall..." required></textarea>
                        </div>
                        <button type="submit" id="generate-btn" class="primary-btn">✨ Generate with AI</button>
                    </form>
                </div>

                <div class="gen-card upload-box" id="drop-zone">
                    <div class="upload-icon">📁</div>
                    <h3>Upload Documents</h3>
                    <p>Drag & drop your syllabus, PDF readings, or lecture notes here</p>
                    <span class="file-dummy-btn">Browse Files</span>
                    <input type="file" id="file-input" style="display: none;" accept=".pdf,.txt,.docx">
                </div>
            </div>
        </section>

        <hr class="section-divider">

        <section class="decks-section">
            <div class="section-header">
                <h2>Your Decks</h2>
                <span class="deck-count" id="deck-counter">0 Decks Available</span>
            </div>
            
            <div class="decks-grid" id="decks-container">
                </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
