<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <p class="subtitle">Create a new account</p>
        
        <form id="register-form">
            <div class="input-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="Enter your email" required>
            </div>
            
            <div class="input-group">
                <label for="reg-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-password" placeholder="Min. 8 characters" required>
                    <span class="toggle-password" id="toggle-reg-password">👁️</span>
                </div>
            </div>

            <p id="reg-error" class="error-message"></p>
            
            <button type="submit" class="primary-btn">Sign Up</button>
        </form>

        <p class="footer-text">Already have an account? <a href="index.html" class="highlight-link">Log in here</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
