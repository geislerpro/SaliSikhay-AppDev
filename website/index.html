<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please log in to your account</p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" placeholder="Enter your username" required>
            </div>
            
            <div class="input-group">
                <label for="login-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                    <span class="toggle-password" id="toggle-login-password">👁️</span>
                </div>
            </div>

            <p id="login-error" class="error-message"></p>
            
            <button type="submit" class="primary-btn">Log In</button>
        </form>

        <p class="footer-text">Don't have an account? <a href="register.html" class="highlight-link">Create here</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
