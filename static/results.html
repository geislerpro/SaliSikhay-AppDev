<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7e22ce">
    <title>Results - SaliSikhayAI</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="results-body">
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">⚡ SaliSikh<span>AI</span></h1>
            <a href="dashboard.html" class="back-link">← Dashboard</a>
        </div>
    </nav>

    <main class="results-container">
        <div class="results-card">
            <!-- Score Display -->
            <div class="score-display">
                <div class="score-circle" id="score-circle">
                    <div class="score-inner">
                        <span class="score-number" id="score-number">0</span>
                        <span class="score-percent">%</span>
                    </div>
                </div>
                <h2 id="result-message">Great Job!</h2>
                <p id="result-subtitle">You've completed the quiz</p>
            </div>

            <!-- Stats -->
            <div class="results-stats">
                <div class="stat-item">
                    <span class="stat-label">Correct Answers</span>
                    <span class="stat-value" id="stat-correct">0/0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Time Taken</span>
                    <span class="stat-value" id="stat-time">0s</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Accuracy</span>
                    <span class="stat-value" id="stat-accuracy">0%</span>
                </div>
            </div>

            <!-- Detailed Results -->
            <div class="detailed-results">
                <h3>Review Your Answers</h3>
                <div id="results-list" class="results-list"></div>
            </div>

            <!-- Action Buttons -->
            <div class="results-actions">
                <button class="secondary-btn" onclick="retakeQuiz()">↻ Retake Quiz</button>
                <button class="primary-btn" onclick="goToDashboard()">Back to Dashboard</button>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script src="/static/results.js"></script>
</body>
</html>
